            "These brakes stop a fast-moving car quickly",
            "These brakes stop a 2-ton car traveling 60 miles an hour, within 240 feet",
            "These high-performance brakes stop the car in the shortest distance",
            "These brakes are effective in stopping any vehicle rapidly",
          ],
          answer:
            "These brakes stop a 2-ton car traveling 60 miles an hour, within 240 feet",
        },
        {
          question:
            "A check question for 'Be concrete' in Lecture 5 asks: 'Have you flashed word pictures, made facts vivid?' This is primarily achieved by:",
          options: [
            "Using longer and more complex sentences",
            "Using crisp, specific, and detailed language",
            "Using passive voice constructions",
            "Using abstract vocabulary",
          ],
          answer: "Using crisp, specific, and detailed language",
        },
        {
          question:
            "How many main qualities of good writing beginning with 'C' are described across Lectures 4 and 5?",
          options: ["Six", "Seven", "Eight", "Nine"],
          answer: "Nine",
        },
        {
          question:
            "A short story writer has expressed the feelings of a beggar in a lifelike way. Which quality of a good writer does this best express?",
          options: ["Precision", "Consideration", "Courtesy", "Conciseness"],
          answer: "Consideration",
        },
        {
          question:
            "A reporter double-checks all names, dates, and statistics before publishing an article. Which quality of good writing is the reporter demonstrating?",
          options: ["Be creative", "Be complete", "Be correct", "Be concrete"],
          answer: "Be correct",
        },
        {
          question:
            "A technical writer presents a complex software manual by including only the steps users actually need, removing all background theory. Which quality does this best illustrate?",
          options: ["Be courteous", "Be concise", "Be credible", "Be concrete"],
          answer: "Be concise",
        },
        {
          question:
            "A business letter ends with 'Thank you for your time, and I appreciate your consideration.' This best demonstrates which quality of good writing?",
          options: ["Conciseness", "Correctness", "Courtesy", "Creativity"],
          answer: "Courtesy",
        },
        {
          question:
            "A writer uses specific figures, statistics, and vivid details to describe a scene, leaving no room for vague interpretation. This demonstrates which quality?",
          options: ["Conciseness", "Clarity", "Concreteness", "Completeness"],
          answer: "Concreteness",
        },
        {
          question:
            "In Lecture 5, 'Be complete' asks writers to check: 'Did you PLAN what you said?' This implies that completeness in writing requires:",
          options: [
            "Spontaneous, unplanned writing for authenticity",
            "Prior planning and deliberate inclusion of all essential information",
            "Writing the conclusion before the introduction",
            "Using only one main idea per paragraph",
          ],
          answer:
            "Prior planning and deliberate inclusion of all essential information",
        },
        {
          question:
            "A journalist stresses reliability and expertise in their writing so that readers trust the information provided. This best demonstrates:",
          options: ["Courtesy", "Creativity", "Credibility", "Conciseness"],
          answer: "Credibility",
        },
      ];
      quizData.sort(() => Math.random() - 0.5);

      let currentQuestion = 0;
      let score = 0;

      const userAnswers = [];

      const questionEl = document.getElementById("question");
      const optionsEl = document.getElementById("options");
      const nextBtn = document.getElementById("nextBtn");
      const submitBtn = document.getElementById("submitBtn");
      const showResultBtn = document.getElementById("showResultBtn");
      const resultBox = document.getElementById("resultBox");
      const questionNumber = document.getElementById("questionNumber");

      function loadQuestion() {
        resetState();

        let currentQuiz = quizData[currentQuestion];

        questionNumber.innerHTML = `Question ${currentQuestion + 1} of ${quizData.length}`;

        questionEl.innerHTML = currentQuiz.question;

        currentQuiz.options.forEach((option) => {
          const button = document.createElement("button");

          button.innerHTML = option;

          button.classList.add("option");

          button.addEventListener("click", () => selectOption(button, option));

          optionsEl.appendChild(button);
        });
      }

      function resetState() {
        optionsEl.innerHTML = "";
      }

      function selectOption(button, option) {
        const buttons = document.querySelectorAll(".option");

        buttons.forEach((btn) => btn.classList.remove("selected"));

        button.classList.add("selected");

        userAnswers[currentQuestion] = option;
      }

      nextBtn.addEventListener("click", () => {
        if (userAnswers[currentQuestion] == null) {
          alert("Please select an answer");

          return;
        }

        currentQuestion++;

        if (currentQuestion < quizData.length) {
          loadQuestion();
        } else {
          nextBtn.style.display = "none";

          submitBtn.style.display = "inline-block";

          questionNumber.innerHTML = "";

          questionEl.innerHTML = "Quiz Completed. Click Submit Quiz";

          optionsEl.innerHTML = "";
        }
      });

      submitBtn.addEventListener("click", () => {
        score = 0;

        quizData.forEach((q, index) => {
          if (userAnswers[index] === q.answer) {
            score++;
          }
        });

        let percentage = ((score / quizData.length) * 100).toFixed(2);

        resultBox.innerHTML = `
          Your Score: ${score} / ${quizData.length}
          <br><br>
          Percentage: ${percentage}%
          `;

        submitBtn.style.display = "none";

        showResultBtn.style.display = "inline-block";
      });

      showResultBtn.addEventListener("click", () => {
        let resultHTML = "";

        quizData.forEach((q, index) => {
          let userAns = userAnswers[index];

          let isCorrect = userAns === q.answer;

          resultHTML += `

          <div style="
          background:#334155;
          padding:20px;
          border-radius:12px;
          margin-top:20px;
          text-align:left;
          ">

          <h3>Q${index + 1}: ${q.question}</h3>

          <p style="margin-top:10px;">
          Your Answer:
          <span style="color:${isCorrect ? "#22c55e" : "#ef4444"}">
          ${userAns}
          </span>
          </p>

          <p style="margin-top:8px;">
          Correct Answer:
          <span style="color:#22c55e">
          ${q.answer}
          </span>
          </p>

          </div>

          `;
        });

        document.getElementById("quizArea").innerHTML = resultHTML;
      });

      loadQuestion();
    </script>
  </body>
</html>
